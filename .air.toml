# air config for live-rebuilding the Go server in development.
# https://github.com/air-verse/air
#
# In dev, air rebuilds the Go API server and serves on :9987.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/game-server ./cmd/game-server"
  bin = "tmp/game-server"
  full_bin = "PORT=9987 ./tmp/game-server --db-dir data/alpha"
  include_ext = ["go"]
  include_dir = ["cmd/game-server", "internal"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
