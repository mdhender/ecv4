openapi: 3.0.3
info:
  title: Experimental Game Server API
  version: 0.3.0
  description: |
    Contract-first REST API for an experimental Go game web server.

    This API is intentionally small and churn-friendly. Treat this file as the
    public contract for player-written clients. Server DTOs and handler stubs are
    generated from this file with oapi-codegen.

    ## Game management

    Everything up to (but not including) the game engine is implemented: creating
    games, managing their lifecycle, and managing rosters. The engine — turns and
    orders (`listTurns`, `getTurn`, `validateOrders`, `submitOrders`,
    `getOrderSubmission`) — is still stubbed and answers `501 Not Implemented`.

    Roles are global-admin, GM, and player. An **admin** creates games and has
    god-mode over every game; admins never hold a membership. A **GM** or
    **player** is a membership row on one game (a GM has elevated rights there).

    A game's status advances along a forward-only chain, skips allowed:
    `draft → recruiting → active → paused → complete → archived`. The only
    backward move is `paused → active` (un-pause), which is admin-only, as is
    moving a game out of `archived`; an archived game is otherwise frozen.

    ### Typical create → recruit → activate workflow

    1. `createGame` (admin) — a new game starts in `draft`.
    2. `addGameMember` with `isGm: true` (admin) — assign the first GM.
    3. `updateGame` `status: recruiting` (GM or admin) — open the game for players.
    4. `addGameMember` (GM or admin) — add players; a net-new player may be added
       only while `recruiting`. Omit `handle` to get the `player_N` default.
    5. `updateGame` `status: active` (GM or admin) — begin play.

    Later, `updateGame` moves the game on to `paused`, `complete`, or `archived`,
    and `updateGameMember` reactivates, promotes, renames, or drops
    (`isActive: false`) members. See each operation for its exact role and status
    rules. The same offline bootstrap (create a game, assign its first GM) is
    available without a running server via the `game-server database game` CLI
    verbs.
servers:
  - url: http://localhost:9987
    description: Local development server
tags:
  - name: System
    description: Health and service metadata
  - name: Auth
    description: Authentication and token lifecycle
  - name: Me
    description: Authenticated user context
  - name: Games
    description: Game catalog, lifecycle, and roster management
  - name: Turns
    description: Turn metadata and state
  - name: Orders
    description: Order validation, submission, and status
  - name: Accounts
    description: Account administration (admin only)
  - name: Admin
    description: Administrative server operations (admin only)
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealth
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /version:
    get:
      tags: [System]
      operationId: getVersion
      summary: Application and database schema version
      description: |
        Returns the running server's application version and the schema
        version of the open database. Public; no authentication required.
      security: []
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Exchange credentials for JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              demo:
                value:
                  username: demo-player
                  password: demo-password
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Exchange a refresh token for a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refresh succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the presented refresh token or session family
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me:
    get:
      tags: [Me]
      operationId: getMe
      summary: Get the authenticated user context
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/games:
    get:
      tags: [Me]
      operationId: listMyGames
      summary: List the games the authenticated user participates in
      description: |
        Returns the games the caller is currently a member of, each with the
        caller's handle in that game and whether they are its game master.
        Scoped to the caller (self-service); no admin role is required. This is
        a read-only projection of the caller's memberships and runs no game
        logic.
      responses:
        '200':
          description: The caller's games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMyGamesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/password:
    post:
      tags: [Me]
      operationId: changeMyPassword
      summary: Change the authenticated user's password
      description: |
        Self-service password change for the logged-in account. The caller must
        supply their current password, which is verified against the stored hash
        before the new password is applied. On success the new password is hashed
        and stored, and the caller's other sessions are revoked so a stolen
        session cannot outlive the password it was created under. No admin role is
        required; the account state is re-read fresh (an account deactivated since
        the token was issued cannot change its password).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/sessions:
    get:
      tags: [Me]
      operationId: listMySessions
      summary: List the authenticated user's active sessions
      description: |
        Returns the caller's active sessions — the refresh-token families that are
        neither revoked nor expired — each with metadata useful for recognizing a
        session (its family id, when its current token was issued, and when it
        expires). Raw tokens are never returned. Scoped to the caller
        (self-service); no admin role is required. Pairs with DELETE
        /me/sessions/{familyId} to revoke one and POST /auth/logout to end the
        current session or every session.
      responses:
        '200':
          description: The caller's active sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMySessionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/sessions/{familyId}:
    parameters:
      - $ref: '#/components/parameters/FamilyId'
    delete:
      tags: [Me]
      operationId: revokeMySession
      summary: Revoke one of the authenticated user's sessions
      description: |
        Revokes a single session (refresh-token family) belonging to the caller,
        identified by its family id, so the "log out this device" counterpart to
        POST /auth/logout. Object-level check: only the caller's own families are
        revocable — an unknown family, or one owned by another account, yields 404
        rather than revealing its existence. Idempotent while the family's records
        persist: revoking an already-revoked family still returns 204.
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /accounts:
    get:
      tags: [Accounts]
      operationId: listAccounts
      summary: List accounts
      description: Admin only. Returns all accounts, ordered by id.
      responses:
        '200':
          description: Accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAccountsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Accounts]
      operationId: createAccount
      summary: Create an account
      description: |
        Admin only. Creates an account, which is inactive and non-admin unless
        isActive / isAdmin are set. If secret is omitted a random passphrase is
        generated and returned once in generatedSecret; only its hash is stored,
        so it is shown once and cannot be recovered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Get an account by id
      description: Admin only. Selected by id.
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Accounts]
      operationId: updateAccount
      summary: Update an account
      description: |
        Admin only. Selected by id. Every field is optional; a present field is
        set and an absent field is left unchanged. At least one field is
        required. A new secret must be at least 8 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/shutdown:
    post:
      tags: [Admin]
      operationId: shutdownServer
      summary: Gracefully shut down the server (development only)
      description: |
        Development only. Triggers a graceful shutdown: the server stops
        accepting new connections and drains in-flight requests (including this
        one) before the process exits. Enabled only when the server was started
        with --development; otherwise it responds 404 as if the route did not
        exist. Admin only.
      responses:
        '202':
          description: Shutdown initiated; the server will drain and stop
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /admin/refresh-tokens/purge:
    post:
      tags: [Admin]
      operationId: purgeRefreshTokens
      summary: Purge expired refresh tokens
      description: |
        Admin only. Deletes refresh-token records that have already expired,
        reclaiming space in the refresh_tokens table. Expired tokens no longer
        authenticate — they fail signature/expiry verification before any store
        lookup — so removing them affects neither active sessions nor
        theft/reuse detection. Revoked-but-unexpired tokens are intentionally
        retained, since presenting one is the reuse signal that revokes a
        session family. Returns the number of records removed. A background
        reaper performs the same purge periodically; this endpoint runs it on
        demand.
      responses:
        '200':
          description: Purge completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurgeRefreshTokensResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/impersonation:
    post:
      tags: [Admin]
      operationId: createImpersonation
      summary: Mint a short-lived token to act as another account
      description: |
        Admin only. Mints a short-lived, non-refreshable access token that bears
        a target non-admin account's identity, so support and debugging can
        reproduce exactly what that player sees and can do. Admins are god-mode
        but never hold a game membership, so this is the only way for an admin to
        exercise player- or GM-scoped, membership-gated behavior.

        The minted token carries the target as its subject and the calling admin
        as an actor (`act`) claim used only for auditing — every request made
        with it is attributed to the real admin. Authorization inside the API
        then uses the *effective* (target) identity, so the token confers the
        target's access only, never admin. The token lives 15 minutes, cannot be
        refreshed (no refresh token is issued and it is rejected at
        /auth/refresh), and any response to a request bearing it carries an
        `Impersonated-Subject` header naming the target.

        The target must be an active, non-admin account other than the caller;
        impersonating yourself, another admin, or an inactive account is
        rejected (409).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpersonationRequest'
      responses:
        '200':
          description: Impersonation token minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpersonationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /games:
    get:
      tags: [Games]
      operationId: listGames
      summary: List games visible to the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/GameStatus'
      responses:
        '200':
          description: Visible games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGamesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Games]
      operationId: createGame
      summary: Create a game
      description: Requires an admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
            examples:
              basic:
                value:
                  code: ALPHA
                  name: Alpha Campaign
                  description: The first playtest game.
      responses:
        '201':
          description: Game created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /games/{gameId}:
    parameters:
      - $ref: '#/components/parameters/GameId'
    get:
      tags: [Games]
      operationId: getGame
      summary: Get a game by id
      responses:
        '200':
          description: Game details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Games]
      operationId: updateGame
      summary: Update a game (status, metadata, visibility)
      description: |
        Applies a partial update to a game. Each field has its own rule from the
        action matrix:
          - status: advances along draft → recruiting → active → paused →
            complete → archived (forward-only, skips allowed) for an active GM or
            an admin. Backward moves are rejected with a 409 except paused → active
            (un-pause) and moving out of archived, both admin-only.
          - name / description: an active GM or an admin; rejected once archived.
          - isActive: admin only; hides the game from non-admin listings,
            orthogonal to status. Frozen while archived.
        An archived game is otherwise frozen: the only accepted change is an admin
        moving its status to another state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameRequest'
            examples:
              openRecruiting:
                summary: Open the game for players (draft → recruiting)
                value:
                  status: recruiting
              activate:
                summary: Begin play (recruiting → active)
                value:
                  status: active
              rename:
                summary: Edit metadata
                value:
                  name: Alpha Campaign
                  description: An updated blurb.
              hide:
                summary: Admin hard-hide
                value:
                  isActive: false
      responses:
        '200':
          description: The updated game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /games/{gameId}/members:
    parameters:
      - $ref: '#/components/parameters/GameId'
    get:
      tags: [Games]
      operationId: listGameMembers
      summary: List a game's members
      description: |
        Lists the game's roster: every assignment (a game_account_role row), GMs
        and players, active and dropped alike. A dropped member stays listed with
        isActive=false so a GM can see who has left. Visible to an admin or any
        account ever assigned to the game; an unknown or not-visible game is a 404.
      responses:
        '200':
          description: The game's members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Games]
      operationId: addGameMember
      summary: Add a member to a game
      description: |
        Assigns an account to the game as a GM or a net-new player. Requires an
        admin or an active GM of the game. Adding a GM is allowed in any status
        except archived; adding a player is allowed only while recruiting (an
        admin bypasses that window). When handle is omitted it defaults to
        player_N, N = the game's current membership count + 1. A supplied or
        computed handle already in use, or an account that is already a member,
        is a 409; use the update endpoint to reactivate a dropped member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
            examples:
              firstGm:
                summary: Assign the first GM (any status but archived)
                value:
                  accountId: 2
                  handle: Overlord
                  isGm: true
              addPlayer:
                summary: Add a player with a default handle (recruiting only)
                value:
                  accountId: 3
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /games/{gameId}/members/{accountId}:
    parameters:
      - $ref: '#/components/parameters/GameId'
      - $ref: '#/components/parameters/AccountId'
    patch:
      tags: [Games]
      operationId: updateGameMember
      summary: Update a game member
      description: |
        Applies a partial update to an existing membership. Drop/self-deactivate is
        folded in here as isActive:false rather than a separate DELETE route, to
        keep the surface small. Each field carries its own rule from the action
        matrix:
          - isActive: reactivate (true) or drop (false). Reactivate resumes a
            dropped member and needs an admin or an active GM (players cannot
            reactivate themselves). Drop soft-deactivates the row (never a physical
            delete): a member may drop themselves at any time, and an admin or an
            active GM may drop another — dropping can legitimately leave the game
            with no active GM or player. Neither is allowed once archived.
          - isGm: only true (promote a player to GM). Admin or an active GM,
            recruiting only (an admin bypasses that window). Demotion is not
            supported.
          - handle: an active GM or an admin may rename any member in any
            non-archived status; a plain player may rename only themselves, only
            while recruiting, and not to a 'player_' handle. A duplicate handle is
            a 409.
        An archived game is frozen: no update is accepted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
            examples:
              reactivate:
                summary: Reactivate a dropped member
                value:
                  isActive: true
              promote:
                summary: Promote a player to GM
                value:
                  isGm: true
              rename:
                summary: Player renames their own handle
                value:
                  handle: Carthage
      responses:
        '200':
          description: The updated member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /games/{gameId}/turns:
    parameters:
      - $ref: '#/components/parameters/GameId'
    get:
      tags: [Turns]
      operationId: listTurns
      summary: List turns for a game
      responses:
        '200':
          description: Turns for the game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTurnsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /games/{gameId}/turns/{turnId}:
    parameters:
      - $ref: '#/components/parameters/GameId'
      - $ref: '#/components/parameters/TurnId'
    get:
      tags: [Turns]
      operationId: getTurn
      summary: Get a turn by id
      responses:
        '200':
          description: Turn details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Turn'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /games/{gameId}/turns/{turnId}/orders:validate:
    parameters:
      - $ref: '#/components/parameters/GameId'
      - $ref: '#/components/parameters/TurnId'
    post:
      tags: [Orders]
      operationId: validateOrders
      summary: Validate an order set without submitting it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersRequest'
            examples:
              basic:
                value:
                  factionId: 7
                  orders: |
                    UNIT 101 MOVE N
                    UNIT 102 SCOUT E
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderValidationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /games/{gameId}/turns/{turnId}/orders:submit:
    parameters:
      - $ref: '#/components/parameters/GameId'
      - $ref: '#/components/parameters/TurnId'
    post:
      tags: [Orders]
      operationId: submitOrders
      summary: Submit an order set for processing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersRequest'
      responses:
        '201':
          description: Submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSubmission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /games/{gameId}/turns/{turnId}/orders/{submissionId}:
    parameters:
      - $ref: '#/components/parameters/GameId'
      - $ref: '#/components/parameters/TurnId'
      - $ref: '#/components/parameters/SubmissionId'
    get:
      tags: [Orders]
      operationId: getOrderSubmission
      summary: Get an order submission
      responses:
        '200':
          description: Submission details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSubmission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    GameId:
      name: gameId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TurnId:
      name: turnId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    FamilyId:
      name: familyId
      in: path
      required: true
      description: Session (refresh-token family) identifier.
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, expired, or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user is not allowed to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current game state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0
    VersionResponse:
      type: object
      required: [application, database]
      properties:
        application:
          type: string
          description: Server application version (semver, including build metadata when available).
          example: 0.1.0-alpha
        database:
          $ref: '#/components/schemas/DatabaseVersion'
    DatabaseVersion:
      type: object
      required: [schemaVersion]
      properties:
        schemaVersion:
          type: integer
          format: int32
          minimum: 0
          description: Number of schema migrations applied to the open database (SQLite user_version).
          example: 4
    PurgeRefreshTokensResponse:
      type: object
      required: [purged]
      properties:
        purged:
          type: integer
          format: int64
          minimum: 0
          description: Number of expired refresh-token records removed.
          example: 12
    ImpersonationRequest:
      type: object
      required: [accountId]
      properties:
        accountId:
          type: integer
          format: int64
          minimum: 1
          description: The active, non-admin account to impersonate.
          example: 42
    ImpersonationResponse:
      type: object
      required: [token, tokenType, expiresInSeconds, subject, actor]
      properties:
        token:
          type: string
          description: |
            A short-lived (15-minute), non-refreshable access token bearing the
            subject's identity. Present it as a normal Bearer token; responses to
            requests made with it carry an Impersonated-Subject header.
        tokenType:
          type: string
          enum: [Bearer]
        expiresInSeconds:
          type: integer
          minimum: 1
          example: 900
        subject:
          $ref: '#/components/schemas/ImpersonationSubject'
        actor:
          $ref: '#/components/schemas/ImpersonationActor'
    ImpersonationSubject:
      type: object
      required: [accountId, email]
      description: The account being impersonated (the effective identity).
      properties:
        accountId:
          type: integer
          format: int64
        email:
          type: string
          format: email
    ImpersonationActor:
      type: object
      required: [accountId]
      description: The admin on whose behalf the token acts (the auditable real identity).
      properties:
        accountId:
          type: integer
          format: int64
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          format: password
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
          format: password
          description: The account's existing password, verified before the change.
        newPassword:
          type: string
          minLength: 8
          format: password
          description: The replacement password. Must satisfy the secret length policy (at least 8 characters).
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresInSeconds]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        expiresInSeconds:
          type: integer
          minimum: 1
          example: 900
    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, username, roles]
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    Role:
      type: string
      enum: [player, gm, admin]
    Account:
      type: object
      required: [id, email, isActive, isAdmin, roles]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        isActive:
          type: boolean
        isAdmin:
          type: boolean
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    AccountResponse:
      type: object
      required: [account]
      properties:
        account:
          $ref: '#/components/schemas/Account'
    CreateAccountRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        secret:
          type: string
          format: password
          description: Optional. If omitted, a random passphrase is generated. Minimum 8 characters.
        isActive:
          type: boolean
          default: false
        isAdmin:
          type: boolean
          default: false
    CreateAccountResponse:
      type: object
      required: [account]
      properties:
        account:
          $ref: '#/components/schemas/Account'
        generatedSecret:
          type: string
          description: |
            The plaintext secret, present only when one was generated (secret
            omitted from the request). Shown once; only its hash is stored.
    UpdateAccountRequest:
      type: object
      properties:
        isActive:
          type: boolean
        isAdmin:
          type: boolean
        secret:
          type: string
          format: password
          description: New secret, minimum 8 characters.
    GameStatus:
      type: string
      enum: [draft, recruiting, active, paused, complete, archived]
    Game:
      type: object
      required: [id, code, name, status]
      example:
        id: 1
        code: ALPHA
        name: Alpha Campaign
        status: recruiting
        description: The first playtest game.
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          pattern: '^[A-Z][A-Z]+$'
        name:
          type: string
        status:
          $ref: '#/components/schemas/GameStatus'
        description:
          type: string
    CreateGameRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          pattern: '^[A-Z][A-Z]+$'
        name:
          type: string
          minLength: 1
        description:
          type: string
    UpdateGameRequest:
      type: object
      description: |
        Partial update to a game; any subset of fields may be set and an omitted
        field is left unchanged. status advances the lifecycle (forward-only, with
        the admin-only paused→active and out-of-archived exceptions); isActive is
        the admin-only hard-hide, orthogonal to status.
      properties:
        status:
          $ref: '#/components/schemas/GameStatus'
        name:
          type: string
          minLength: 1
        description:
          type: string
        isActive:
          type: boolean
    ListGamesResponse:
      type: object
      required: [games]
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/Game'
    MyGame:
      type: object
      description: |
        A game the authenticated user participates in, projected together with
        the caller's membership in it (handle and game-master status).
      required: [id, code, isActive, handle, isGm]
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: The game's stable code.
          example: ALPHA
        isActive:
          type: boolean
          description: Whether the game itself is active.
        handle:
          type: string
          description: The caller's handle within this game.
          example: Rome
        isGm:
          type: boolean
          description: Whether the caller is a game master in this game.
    ListMyGamesResponse:
      type: object
      required: [games]
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/MyGame'
    Member:
      type: object
      description: |
        One entry in a game's roster: an account's assignment to the game
        (a game_account_role row), with its handle and role. A dropped member
        remains listed with isActive=false.
      required: [accountId, handle, isGm, isActive]
      example:
        accountId: 2
        handle: Overlord
        isGm: true
        isActive: true
      properties:
        accountId:
          type: integer
          format: int64
          description: The account assigned to the game.
        handle:
          type: string
          description: The member's handle within this game.
          example: Rome
        isGm:
          type: boolean
          description: Whether the member is a game master in this game.
        isActive:
          type: boolean
          description: Whether the membership is active (false if the member was dropped).
    ListMembersResponse:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
    AddMemberRequest:
      type: object
      description: |
        Request to assign an account to a game. handle is optional and defaults to
        player_N (N = the game's current membership count + 1) when omitted; when
        supplied it must be unique within the game.
      required: [accountId]
      properties:
        accountId:
          type: integer
          format: int64
          description: The account to assign to the game.
        handle:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9._-]+$'
          description: |
            The member's handle, unique within the game. Two or more characters,
            starting with a letter, using only letters, digits, '.', '_' or '-'.
            Omit to default to player_N.
          example: Overlord
        isGm:
          type: boolean
          default: false
          description: Assign the member as a game master rather than a player.
    UpdateMemberRequest:
      type: object
      description: |
        Partial update to a game membership; any subset of fields may be set and an
        omitted field is left unchanged. isActive reactivates (true) or drops
        (false) the member; isGm may only be set to true (promote a player to GM) —
        demotion is not supported. A handle edited by the member themselves may not
        begin with 'player_'.
      properties:
        isActive:
          type: boolean
          description: Set true to reactivate a dropped member, or false to drop (deactivate) them.
        isGm:
          type: boolean
          description: Set true to promote a player to game master.
        handle:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9._-]+$'
          description: |
            A new handle, unique within the game. Two or more characters, starting
            with a letter, using only letters, digits, '.', '_' or '-'.
          example: Carthage
    Session:
      type: object
      description: |
        An active session for the authenticated user: a refresh-token family that
        is neither revoked nor expired. The raw tokens are never included.
      required: [familyId, issuedAt, expiresAt]
      properties:
        familyId:
          type: string
          description: Stable identifier for the session (the refresh-token family id).
          example: 3f1a9c0b7d2e4f5a6b8c9d0e1f2a3b4c
        issuedAt:
          type: string
          format: date-time
          description: When the session's current refresh token was issued.
        expiresAt:
          type: string
          format: date-time
          description: When the session's current refresh token expires.
    ListMySessionsResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    ListAccountsResponse:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
    TurnStatus:
      type: string
      enum: [open, locked, processing, published]
    Turn:
      type: object
      required: [id, gameId, label, status]
      properties:
        id:
          type: integer
          format: int64
        gameId:
          type: integer
          format: int64
        label:
          type: string
          example: Spring 901
        status:
          $ref: '#/components/schemas/TurnStatus'
        ordersDueAt:
          type: string
          format: date-time
          nullable: true
    ListTurnsResponse:
      type: object
      required: [turns]
      properties:
        turns:
          type: array
          items:
            $ref: '#/components/schemas/Turn'
    OrdersRequest:
      type: object
      required: [factionId, orders]
      properties:
        factionId:
          type: integer
          format: int64
          minimum: 1
        orders:
          type: string
          minLength: 1
    OrderValidationResult:
      type: object
      required: [ok, messages]
      properties:
        ok:
          type: boolean
        messages:
          type: array
          items:
            $ref: '#/components/schemas/OrderMessage'
    OrderMessage:
      type: object
      required: [severity, message]
      properties:
        severity:
          type: string
          enum: [info, warning, error]
        line:
          type: integer
          minimum: 1
        message:
          type: string
    OrderSubmission:
      type: object
      required: [id, gameId, turnId, factionId, status, submittedAt]
      properties:
        id:
          type: integer
          format: int64
        gameId:
          type: integer
          format: int64
        turnId:
          type: integer
          format: int64
        factionId:
          type: integer
          format: int64
        status:
          type: string
          enum: [submitted, accepted, rejected, superseded]
        submittedAt:
          type: string
          format: date-time
        validation:
          $ref: '#/components/schemas/OrderValidationResult'
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: unauthorized
        message:
          type: string
          example: access token is missing or invalid
        requestId:
          type: string
